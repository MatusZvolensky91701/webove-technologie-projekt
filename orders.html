<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Orders</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">MeCargo</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="track.html">Track Order</a>
    <a href="statuses.html">Statuses</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="orders.html" class="active">Orders</a>
  </div>
</nav>
<main class="container">
  <h1>Orders</h1>

  <section class="card">
    <h2>Add new order</h2>

    <label>Order ID</label>
    <input type="text" id="newId" placeholder="OBJ-2026-00125">

    <label>Customer</label>
    <input type="text" id="newCustomer" placeholder="Matus Zvolensky">

    <label>Email</label>
    <input type="email" id="newEmail" placeholder="matus@example.com">

    <label>Status</label>
    <select id="newStatus">
      <option>Received</option>
      <option>Processing</option>
      <option>On the way</option>
      <option>Delivered</option>
    </select>

    <button onclick="addOrder()">Add order</button>
  </section>

  <section class="card">
    <h2>Saved orders</h2>

    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>Edit order</h2>

    <label>Order ID</label>
    <input type="text" id="editId" readonly>

    <label>New status</label>
    <select id="editStatus">
      <option>Received</option>
      <option>Processing</option>
      <option>On the way</option>
      <option>Delivered</option>
    </select>

    <button onclick="saveEdit()">Save change</button>
  </section>
</main>

<script src="data/storage.js"></script>
<script src="data/orders.js"></script>


</body>
</html>
